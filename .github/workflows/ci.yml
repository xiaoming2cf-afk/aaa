name: CI Quality Gates

"on":
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_slow_model_upgrade:
        description: "Run verify_model_upgrade slow gate"
        required: false
        default: false
        type: boolean
      trigger_render_deploy:
        description: "Trigger Render deploy after all gates pass"
        required: false
        default: false
        type: boolean
      render_base_url:
        description: "Optional deployed URL for smoke-deploy"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "13 9 * * 1"

permissions:
  contents: read

env:
  PIP_PREFER_BINARY: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  backend-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend
        run: python -m pip install --upgrade pip "setuptools<81" wheel && python -m pip install -e ".[dev,quant-tree]"
      - name: Backend pytest
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-spa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-spa/package-lock.json
      - name: Install frontend
        run: npm ci
      - name: Frontend tests
        run: npm run test
      - name: Frontend build
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend-spa/dist

  scan-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan repository hygiene
        run: PYTHONPATH=src python scripts/scan_repo_hygiene.py .

  verify-agent-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend
        run: python -m pip install --upgrade pip "setuptools<81" wheel && python -m pip install -e ".[dev,quant-tree]"
      - name: Verify agent quality gate
        run: python scripts/verify_agent_quality_gate.py --output output/ci/agent-quality-gate.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-quality-gate
          path: output/ci/agent-quality-gate.json

  compare-model-engines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend
        run: python -m pip install --upgrade pip "setuptools<81" wheel && python -m pip install -e ".[dev,quant-tree]"
      - name: Compare model engines
        run: python scripts/compare_model_engines.py --output-dir output/ci/model-engine-comparison
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-engine-comparison
          path: output/ci/model-engine-comparison

  engineering-gate-artifact:
    runs-on: ubuntu-latest
    needs:
      - backend-pytest
      - frontend
      - scan-hygiene
      - verify-agent-quality-gate
      - compare-model-engines
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend-spa/dist
      - name: Write commit-bound engineering gate artifact
        run: python scripts/write_engineering_gate_artifact.py --commit "${GITHUB_SHA}" --output "output/engineering-gate/engineering-gate.${GITHUB_SHA}.json"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engineering-gate-${{ github.sha }}
          path: output/engineering-gate/engineering-gate.${{ github.sha }}.json

  verify-deploy-artifacts:
    runs-on: ubuntu-latest
    needs:
      - engineering-gate-artifact
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: engineering-gate-${{ github.sha }}
          path: output/engineering-gate
      - name: Verify deploy artifact consistency
        run: python scripts/verify_deploy_artifacts.py --commit "${GITHUB_SHA}" --engineering-gate "output/engineering-gate/engineering-gate.${GITHUB_SHA}.json" --output "output/deploy-artifacts/deploy-artifacts.${GITHUB_SHA}.json"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-artifacts-${{ github.sha }}
          path: output/deploy-artifacts/deploy-artifacts.${{ github.sha }}.json

  verify-model-upgrade:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_slow_model_upgrade)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend
        run: python -m pip install --upgrade pip "setuptools<81" wheel && python -m pip install -e ".[dev,quant-tree]"
      - name: Verify model upgrade slow gate
        run: python scripts/verify_model_upgrade.py --output-dir output/ci/model-upgrade
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-upgrade
          path: output/ci/model-upgrade

  render-deploy:
    runs-on: ubuntu-latest
    needs:
      - verify-deploy-artifacts
    if: github.event_name == 'workflow_dispatch' && inputs.trigger_render_deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deploy verifier dependencies
        run: python -m pip install --upgrade pip "setuptools<81" wheel && python -m pip install -e .
      - name: Trigger Render deploy and smoke check
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: python scripts/verify_render_deploy.py --commit "${GITHUB_SHA}" --base-url "${{ inputs.render_base_url }}" --output "output/render-deploy/render-deploy.${GITHUB_SHA}.json"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: render-deploy-${{ github.sha }}
          path: output/render-deploy/render-deploy.${{ github.sha }}.json
