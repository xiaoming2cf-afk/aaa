services:
  - type: web
    name: economic-research-web
    runtime: python
    plan: free
    healthCheckPath: /api/health
    buildCommand: cd frontend-spa && npm ci && npm run build && cd .. && python -m pip install --upgrade pip "setuptools<81" wheel && pip install -e .
    startCommand: uvicorn research_agent.asgi:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: PIP_PREFER_BINARY
        value: "1"
      - key: APP_NAME
        value: Economic Research Platform
      - key: APP_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CRON_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TRUSTED_PROXY_IPS
        sync: false
      - key: ASSET_STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: research-assets
      - key: STORAGE_DIR
        value: /tmp/economic-research-storage
      - key: RESEARCH_AGENT_REPORTS_DIR
        value: /tmp/economic-research-storage/reports
      - key: SESSION_TTL_HOURS
        value: 72
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_SECURITY
        value: ssl
      - key: PASSWORD_RESET_TTL_MINUTES
        value: 30
      - key: FRED_API_KEY
        sync: false
      - key: GDELT_MAX_RECORDS
        value: 15
      - key: DEFAULT_FRED_SERIES
        value: FEDFUNDS,CPIAUCSL,UNRATE,DGS10
      - key: PUBLIC_DIGEST_ENABLED
        value: "true"
      - key: PUBLIC_DIGEST_TIMEZONE
        value: Asia/Shanghai
      - key: PUBLIC_DIGEST_LOCAL_TIME
        value: 08:30
      - key: PUBLIC_DIGEST_TITLE
        value: Global Economic Daily
      - key: PUBLIC_DIGEST_QUERY
        sync: false
      - key: PUBLIC_DIGEST_MAX_RECORDS
        value: 30
      - key: DATA_LAB_AGENT_ENABLED
        value: "false"
      - key: DATA_LAB_AGENT_MAX_ATTEMPTS
        value: 3
      - key: DATA_LAB_AGENT_TIMEOUT_SECONDS
        value: 20
      - key: DATA_LAB_AGENT_OUTPUT_LIMIT
        value: 12000
      - key: DATA_LAB_AGENT_EXECUTION_MODE
        value: subprocess_replay
      - key: DATA_LAB_AGENT_IPYTHON_ENABLED
        value: "false"
      - key: DATA_LAB_AGENT_LLM_ENABLED
        value: "false"
      - key: AGENT_MATH_MODE
        value: shadow
      - key: AGENT_MATH_DELIVERY_THRESHOLD
        value: 0.85
      - key: AGENT_MATH_HUMAN_THRESHOLD
        value: 0.55
      - key: AGENT_MATH_OVERRIDE_MARGIN
        value: 0.05
